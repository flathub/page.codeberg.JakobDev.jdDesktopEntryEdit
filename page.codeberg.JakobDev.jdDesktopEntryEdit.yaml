id: page.codeberg.JakobDev.jdDesktopEntryEdit
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: jdDesktopEntryEdit
cleanup-commands:
  - /app/cleanup-BaseApp.sh
build-options:
  env:
    - BASEAPP_REMOVE_PYWEBENGINE=1
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --share=ipc

modules:
  - python3-modules.yaml

  - name: jdDesktopEntryEdit
    buildsystem: simple
    build-commands:
      - pip install --no-deps --no-build-isolation --prefix=$FLATPAK_DEST .
      - python ./install-unix-datafiles.py --prefix=$FLATPAK_DEST
    sources:
      - type: archive
        url: https://codeberg.org/JakobDev/jdDesktopEntryEdit/archive/1.8.tar.gz
        sha256: eac1be655743ccf64a233b704b088005d12d8ba0d4653c49ca0aa94020392a41
        x-checker-data:
          type: json
          url: https://codeberg.org/api/v1/repos/JakobDev/jdDesktopEntryEdit/releases/latest
          version-query: .tag_name
          url-query: .tarball_url
